name: CI/CD Deployment

on:
  push:
    branches:
      - main

env:
  ACTIONS_ALLOW_USE_UNSECURE_NODE_VERSION: 'true'

jobs:
  build-and-deploy:
    runs-on: [self-hosted, linux, x64]

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: 'npm'

      - name: Install Dependencies
        run: npm ci

      - name: Run Build (CI Verification)
        run: npm run build

      - name: Deploy and Restart App Locally on VPS
        run: |
          DEPLOY_PATH="${{ secrets.DEPLOY_PATH }}"
          
          echo "=== 1. Creando el directorio de despliegue si no existe ==="
          mkdir -p "$DEPLOY_PATH"
          
          echo "=== 2. Copiando archivos de compilación al directorio de producción ==="
          # Copy Next.js production files and configurations locally on the VPS
          cp -R .next "$DEPLOY_PATH/"
          cp -R public "$DEPLOY_PATH/"
          cp package.json "$DEPLOY_PATH/"
          cp package-lock.json "$DEPLOY_PATH/"
          cp next.config.ts "$DEPLOY_PATH/"
          cp tsconfig.json "$DEPLOY_PATH/"
          
          cd "$DEPLOY_PATH"
          
          echo "=== 3. Instalando dependencias de producción en la carpeta destino ==="
          npm install --omit=dev
          
          echo "=== 4. Reiniciando o iniciando el proceso en PM2 ==="
          if pm2 list | grep -q "copisteria-garcia"; then
            echo "Reiniciando proceso PM2 existente..."
            pm2 restart copisteria-garcia
          else
            echo "Iniciando nuevo proceso PM2..."
            pm2 start npm --name "copisteria-garcia" -- run start
          fi
          
          pm2 save
          echo "=== ¡DESPLIEGUE COMPLETADO CORRECTAMENTE! ==="
